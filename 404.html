<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page not found — Sera FX</title>
<meta name="robots" content="noindex">
<link rel="icon" href="/favicon.ico" sizes="16x16" type="image/x-icon">
<link rel="icon" href="/favicon-32x32.png" sizes="32x32" type="image/png">
<link rel="apple-touch-icon" href="/apple-icon-180x180.png" sizes="180x180">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&family=Instrument+Serif:ital@1&display=swap" rel="stylesheet">
<style>
  :root{--sera:#00D26A;--sera-deep:#1B7A3F;--paper:#FFFFFF;--paper-warm:#FAF7EE;--rule:#E5E7E0;--ink:#0B1426;--ink-muted:#455067}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--paper);color:var(--ink);font-family:"IBM Plex Sans",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;min-height:100vh;display:grid;place-items:center;text-align:center;padding:24px;-webkit-font-smoothing:antialiased}
  .mark{width:64px;height:64px;border-radius:16px;object-fit:cover;margin:0 auto 28px;display:block}
  .code{font-family:"IBM Plex Mono",monospace;font-size:13px;letter-spacing:.14em;text-transform:uppercase;color:var(--sera-deep);font-weight:500}
  h1{font-size:clamp(30px,6vw,46px);letter-spacing:-.03em;font-weight:600;margin:14px 0 10px}
  h1 em{font-family:"Instrument Serif",Georgia,serif;font-style:italic;color:var(--sera-deep)}
  p{color:var(--ink-muted);font-size:17px;max-width:44ch;margin:0 auto 30px}
  a.btn{display:inline-flex;align-items:center;gap:8px;font-weight:600;font-size:15px;padding:13px 24px;border-radius:11px;background:var(--sera);color:#04120a;box-shadow:0 10px 26px -12px rgba(0,210,106,.7);transition:transform .18s,background .2s;text-decoration:none}
  a.btn:hover{background:var(--sera-deep);color:#fff;transform:translateY(-2px)}
  .links{margin-top:22px;font-family:"IBM Plex Mono",monospace;font-size:13px;color:var(--ink-muted)}
  .links a{color:var(--sera-deep);text-decoration:none;margin:0 10px}
  .links a:hover{text-decoration:underline}
</style>
</head>
<body>
  <main>
    <img class="mark" src="/assets/sera-mark.png" alt="Sera">
    <div class="code">Error 404</div>
    <h1>This rate <em>doesn't exist.</em></h1>
    <p>The page you're looking for moved or never existed. The rates, however, are still live.</p>
    <a class="btn" href="/">Back to Sera FX →</a>
    <div class="links">
      <a href="https://docs.sera.cx">API docs</a>·
      <a href="https://github.com/seraprotocol">SDKs</a>·
      <a href="https://community.sera.cx">Community</a>
    </div>
  </main>
</body>
</html>
